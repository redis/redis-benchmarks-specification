      memory: 8g
  dataset_name: 1Mkeys-zset-120-elements-50B-listpack
  dataset_description: 1,000,000 sorted-set keys, each listpack-encoded with 120
    members of 50 bytes (integer scores 1-120), just below zset-max-listpack-entries 128.
tested-groups:
- sorted-set
tested-commands:
- zincrby
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: --command="ZINCRBY __key__ 1 m60AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    --command-key-pattern=R --key-prefix "zset:" --key-minimum 1 --key-maximum 1000001
    --hide-histogram --test-time 180 --pipeline 10 -c 1 -t 1
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 68
