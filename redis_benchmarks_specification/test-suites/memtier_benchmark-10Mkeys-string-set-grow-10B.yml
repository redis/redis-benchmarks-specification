version: 0.4
name: memtier_benchmark-10Mkeys-string-set-grow-10B
description: 10M key insertion benchmark that forces many dict rehash cycles during the test run. Starts with an empty database and uses SET with sequential keys up to 10M, exercising dict expansion and incremental rehash overhead under continuous insertion pressure. Validates dict growth performance including memory allocation, hash table resizing, and rehash amortization.
dbconfig:
  configuration-parameters:
    save: '""'
  resources:
    requests:
      memory: 2g
tested-commands:
- set
tested-groups:
- string
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: '"--data-size" "10" "--ratio" "1:0" "--key-pattern" "P:P" "-c" "50" "-t" "2" "--hide-histogram" "--key-minimum" "1" "--key-maximum" "10000000" "-n" "allkeys"'
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 50
