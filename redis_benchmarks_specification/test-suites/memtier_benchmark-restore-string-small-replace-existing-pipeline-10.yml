version: 0.4
name: memtier_benchmark-restore-string-small-replace-existing-pipeline-10
description: 'RESTORE ... REPLACE of a 10-byte EMBSTR DUMP payload against a small pre-populated keyspace exercising the replace dbDelete+dbAdd path, at pipeline depth 10 (throughput regime: amortized round-trips, max ops/sec). Payload was produced by a real SET/HSET + DUMP on Redis 7.4 (RDB version 12); accepted by any server with RDB_VERSION >= 12 (Redis >= 7.4). Measures the restoreCommand insertion path (verifyDumpPayload -> rdbLoadObject -> dbDelete+dbAdd). Regenerate the payload from DUMP if bumping the pinned RDB version.'
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: --command 'RESTORE __key__ 0 "\x00\x0a\x41\x41\x41\x41\x41\x41\x41\x41\x41\x41\x0c\x00\x86\xc3\x89\x83\xde\x57\xe3\x8a"' --command-key-pattern=P --key-prefix "restore_" --key-minimum 1 --key-maximum 1001 -n allkeys --hide-histogram -t 1 -c 1
  resources:
    requests:
      memory: 1g
tested-groups:
- generic
tested-commands:
- restore
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: --command 'RESTORE __key__ 0 "\x00\x0a\x41\x41\x41\x41\x41\x41\x41\x41\x41\x41\x0c\x00\x86\xc3\x89\x83\xde\x57\xe3\x8a" REPLACE' --command-key-pattern=R --key-prefix "restore_" --key-minimum 1 --key-maximum 1000 --pipeline 10 -c 50 -t 4 --test-time 180 --hide-histogram
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 111
