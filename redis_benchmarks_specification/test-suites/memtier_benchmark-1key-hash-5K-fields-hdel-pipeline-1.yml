version: 0.4
name: memtier_benchmark-1key-hash-5K-fields-hdel-pipeline-1
description: >
  Runs memtier_benchmark, testing HDEL performance on a hash with 5K fields.
  Pre-loads a single hash key with 5000 fields (field:1 through field:5000),
  each with a 10-byte value. The benchmark randomly deletes fields using HDEL.
  This tests the dict auto-resize pause optimization during bulk deletion.
  Uses --randomize to ensure continuous field removal throughout the test.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: >
      --hide-histogram
      --command "HSET hash1 __key__ __data__"
      --command-key-pattern P
      --key-maximum 5000
      --key-minimum 1
      --key-prefix "field:"
      --data-size 10
      -n 5000 -c 1 -t 1 --pipeline 50
  resources:
    requests:
      cpus: '2'
      memory: 1g
  dataset_name: 1key-hash-5K-fields-10B-values
  dataset_description: Single hash key with 5000 fields, each field named field:N with a 10-byte value.
tested-commands:
- hdel
tested-groups:
- hash
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: >
    --command "HDEL hash1 __key__"
    --command-key-pattern R
    --key-maximum 5000
    --key-minimum 1
    --key-prefix "field:"
    --hide-histogram
    --test-time 180
    --pipeline 1
    -c 1
    -t 1
    --randomize
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 19
