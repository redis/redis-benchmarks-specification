version: 0.4
name: memtier_benchmark-10Mkeys-10B-expire-use-case
description: Runs memtier_benchmark, for a keyspace length of 10M keys with a data
  size of 10 Bytes for each key, where 50% of the keys have expiration set during
  the benchmark. The large keyspace ensures the expires dict exceeds L3 cache, making
  the active-expire scan memory-bound (DRAM-latency dominated). Companion to the
  1Mkeys-10B-expire-use-case benchmark for testing DRAM-bound expire scenarios.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 10000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: '"--data-size" "10" "--command" "SET __key__ __data__" "--command-key-pattern"
      "P" "-c" "1" "-t" "8" "--hide-histogram" "--key-minimum" "1" "--key-maximum"
      "10000000" "-n" "allkeys" --pipeline 50'
    timeout: 3600
  resources:
    requests:
      memory: 4g
  dataset_name: 10Mkeys-string-10B-size
  dataset_description: This dataset contains 10 million string keys, each with a data
    size of 10 bytes. The large keyspace ensures the expires dictionary exceeds L3 cache.
tested-groups:
- string
- generic
tested-commands:
- set
- setx
- get
- del
- setex
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: '"--data-size" "10" --command "SETEX __key__ 10 __data__" --command-key-pattern="R"
    --command "SET __key__ __data__" --command-key-pattern="R" --command "GET __key__"
    --command-key-pattern="R" --command "DEL __key__" --command-key-pattern="R" -c
    50 -t 2 --hide-histogram --test-time 120 "--key-minimum" "1" "--key-maximum" "10000000"'
  resources:
    requests:
      cpus: '3'
      memory: 2g
priority: 50
