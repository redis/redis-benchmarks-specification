version: 0.4
name: memtier_benchmark-Nclients-bzpopmin-1key-rotated-pipeline-1
description: >
  Blocking sorted-set unblock-latency sentinel (see issue #402), the BZPOPMIN
  counterpart of the BLPOP suite. Exercises the blocked-to-unblocked client code
  path in blocked.c (blockForKeys, handleClientsBlockedOnKeys,
  serveClientBlockedOnKey for the zset path, processUnblockedClients,
  unblockClient) which no existing memtier_benchmark spec covers. One producer
  (a single connection) issues rotating ZADD on a single sorted-set key while
  N=100 consumer connections (-c 25 -t 4) each run BZPOPMIN key 0 with pipeline 1.
  Because the consumers vastly outnumber the single producer, the zset stays
  near-empty, so almost every BZPOPMIN registers as blocked-on-key and is later
  served by a ZADD -- driving traffic through the zset unblock path on essentially
  every op and growing the processUnblockedClients queue that beforeSleep() drains
  each tick. The exported Totals are the consumer group's (last clientconfig):
  Ops/sec is the unblock rate and p50/p99 are the unblock latency. MULTI-CLIENT
  SUITE: runs only on a runner with BENCHMARK_MULTITOOL_ENABLED=1 (the coordinator
  skips it otherwise). EXPORT-PROVENANCE INVARIANT: the multi-client runner
  exports the LAST memtier clientconfig's JSON, so the BZPOPMIN consumer group
  MUST stay last. CLEAN SHUTDOWN: the producer uses a slightly longer --test-time
  than the consumers (125 vs 120) purely so it outlives them -- any consumer still
  parked in a blocking BZPOPMIN when its own test-time expires gets one final ZADD
  and returns, instead of hanging forever on BZPOPMIN timeout 0. The producer does
  NOT "drain the backlog": once the consumers stop, the small ~5s producer tail
  simply ZADDs onto an idle zset that nobody is popping. Do NOT run this suite with
  a single uniform --override-memtier-test-time (it would stop the producer at the
  same instant and could leave a blocked consumer hanging). MEMORY CEILING: while
  the consumers run they drain essentially every op, so the zset stays ~empty
  during the measured window; only the ~5s solo-producer tail after the consumers
  stop grows it (~17K ZADD/s => <100K 32B members, a few MB), which is why the tail
  is kept small -- a large tail (the old 150 vs 120) would balloon the zset into
  the hundreds of thousands of members. VERIFYING THE BLOCKING PATH: there is no
  in-spec assertion for this (the runner's dbconfig.check only asserts keyspacelen
  at benchmark start, not blocked_clients during the run). To confirm the workload
  is genuinely blocking, poll `INFO clients` and `ZCARD bzpopmin:key:1` every 1s
  while the suite runs: on the blocking path blocked_clients approaches the
  consumer connection count (~100) and ZCARD stays ~0; if instead blocked_clients
  ~0 and ZCARD grows, the workload has regressed to the non-blocking fast path.
  This mirrors the sibling BLPOP suite, where the same method measured
  blocked_clients 48-50 and an empty key throughout a reduced-connection run.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 0
  resources:
    requests:
      memory: 1g
# tested-commands lists every verb the workload sends (both clientconfigs): zadd
# is the producer feed; bzpopmin is the measured/exported blocking consumer command.
tested-commands:
- zadd
- bzpopmin
tested-groups:
- sorted-set
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfigs:
# Producer (index 0): 1 connection adding members with a constant score 1 and a
# rotating 32B member onto the single zset key. --test-time 125 is a small tail
# past the consumers' 120 so the producer outlives them (the last blocked BZPOPMIN
# gets one final ZADD and returns); it is NOT draining a backlog. Keep the tail
# small: after the consumers stop it ZADDs onto an idle zset (~17K ops/s => <100K
# members, a few MB).
- run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: >-
    --data-size 32
    --command "ZADD bzpopmin:key:1 1 __data__"
    -c 1 -t 1 --pipeline 1 --distinct-client-seed
    --test-time 125 --hide-histogram
  resources:
    requests:
      cpus: '1'
      memory: 1g
# Consumer group (index 1, LAST => exported): N=100 connections each blocking on
# the same single key with BZPOPMIN ... 0 and pipeline 1. Its Totals p50/p99 are
# the unblock latency and Ops/sec the unblock rate.
- run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: >-
    --command "BZPOPMIN bzpopmin:key:1 0"
    -c 25 -t 4 --pipeline 1
    --test-time 120 --print-percentiles 50,99 --hide-histogram
  resources:
    requests:
      cpus: '4'
      memory: 2g
exporter:
  redistimeseries:
    timemetric: $."ALL STATS".Runtime."Start time"
    metrics:
    - $."ALL STATS".Totals."Ops/sec"
    - $."ALL STATS".Totals."Latency"
    - $."ALL STATS".Totals."Percentile Latencies"."p50.00"
    - $."ALL STATS".Totals."Percentile Latencies"."p99.00"
priority: 50
