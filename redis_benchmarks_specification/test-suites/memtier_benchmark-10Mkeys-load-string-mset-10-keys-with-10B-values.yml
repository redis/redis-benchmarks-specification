version: 0.4
name: memtier_benchmark-10Mkeys-load-string-mset-10-keys-with-10B-values
description: Runs memtier_benchmark, for a keyspace length of 10M keys loading STRINGs
  using MSET with 10 keys per command. Each value has a data size of 10 Bytes. The
  large keyspace ensures the dict exceeds L3 cache, making dict lookups DRAM-latency
  dominated and prefetch-sensitive. Encoding is EMBSTR (10B < 44B threshold).
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 10000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: --data-size 10 --key-maximum 10000000 --key-prefix "" --command="SET
      __key__ __data__" --command-key-pattern P --key-minimum 1 --hide-histogram
      -t 8 -c 1 --pipeline 50
    timeout: 3600
  resources:
    requests:
      memory: 4g
  dataset_name: 10Mkeys-string-10B-size-no-key-prefix
  dataset_description: This dataset contains 10 million string keys, each with a data
    size of 10 Bytes (EMBSTR encoding). The large keyspace ensures dict lookups are
    DRAM-latency dominated.
tested-commands:
- mset
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: --key-maximum 10000000 --data-size 10 --key-prefix "" --command "MSET
    __key__ __data__ __key__ __data__ __key__ __data__ __key__ __data__ __key__ __data__
    __key__ __data__ __key__ __data__ __key__ __data__ __key__ __data__ __key__ __data__"
    -c 50 -t 8 --hide-histogram --test-time 180
  resources:
    requests:
      cpus: '8'
      memory: 2g
tested-groups:
- string
priority: 50
