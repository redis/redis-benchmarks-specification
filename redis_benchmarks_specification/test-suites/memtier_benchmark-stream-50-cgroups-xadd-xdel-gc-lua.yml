      memory: 4g
  dataset_name: stream-100k-entries-50-cgroups-for-xdel-gc
  dataset_description: A stream with 100K entries and 50 consumer groups, designed to stress XDEL GC cleanup path with many groups.
tested-commands:
  - eval
  - xadd
  - xdel
tested-groups:
  - stream
  - scripting
redis-topologies:
  - oss-standalone
build-variants:
  - gcc:15.2.0-amd64-debian-bookworm-default
  - gcc:15.2.0-arm64-debian-bookworm-default
  - dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: >
    --command="eval \"local id = redis.call('XADD','stream-key','*','field','value'); local entries = redis.call('XRANGE','stream-key','-','+','COUNT',1); if entries and #entries > 0 then redis.call('XDEL','stream-key',entries[1][1]) end; return id\" 0"
    --hide-histogram
    --test-time 120
    -c 50
    -t 4
  resources:
    requests:
      cpus: "4"
      memory: 2g
priority: 95
