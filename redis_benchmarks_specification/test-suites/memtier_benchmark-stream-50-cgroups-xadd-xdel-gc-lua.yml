version: 0.4
name: memtier_benchmark-stream-50-cgroups-xadd-xdel-gc-lua
description: >
  Tests stream GC cleanup with XDEL across 50 consumer groups using a Lua script.
  Pre-loads 100K stream entries, creates 50 consumer groups, and reads entries into
  each group's PEL. The Lua script adds a new entry and deletes the oldest entry,
  triggering streamCleanupEntryCGroupRefs() which must scan all 50 groups to remove
  PEL references. This directly stresses the O(C) scan path introduced by removing
  cgroups_ref, where C is the number of consumer groups.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: '"--data-size" "100" --command "XADD stream-key * field __data__" --command-key-pattern="P" -n 500 -c 50 -t 4 --hide-histogram'
  init_commands:
    - XGROUP CREATE stream-key cg-01 0 MKSTREAM
    - XGROUP CREATE stream-key cg-02 0
    - XGROUP CREATE stream-key cg-03 0
    - XGROUP CREATE stream-key cg-04 0
