version: 0.4
name: memtier_benchmark-1Mkeys-string-watch-multi-exec-32B
description: Measures throughput of WATCH + MULTI + SET + EXEC transaction pattern. Each operation watches a key, starts a transaction, sets it, and executes. Validates the WATCH O(1) duplicate check optimization (hashmap-based dedup instead of O(N) linked list scan). High WATCH frequency stresses the watch-key tracking path.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: '"--data-size" "32" "--ratio" "1:0" "--key-pattern" "P:P" "-c" "50" "-t" "2" "--hide-histogram" "--key-minimum" "1" "--key-maximum" "1000000" "-n" "allkeys" --pipeline 50'
  resources:
    requests:
      memory: 1g
  dataset_name: 1Mkeys-string-32B-size
  dataset_description: This dataset contains 1 million string keys, each with a data size of 32 bytes.
tested-commands:
- watch
- multi
- set
- exec
tested-groups:
- transactions
- string
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: --command "WATCH __key__" --command-key-pattern R --command "MULTI" --command "SET __key__ __data__" --command-key-pattern R --command "EXEC" --data-size 32 --key-minimum 1 --key-maximum 1000000 -c 10 -t 4 --hide-histogram --test-time 120
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 50
