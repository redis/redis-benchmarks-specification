version: 0.4
name: memtier_benchmark-1Mkeys-generic-info-all
description: Measures throughput of INFO ALL command on a server with 1M keys loaded.
  INFO is a latency-sensitive introspection command that generates a multi-KB response.
  Validates the info-command-prealloc optimization that pre-sizes the SDS buffer
  to collapse ~10-15 sdsMakeRoomFor realloc calls into one.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: '"--data-size" "10" "--ratio" "1:0" "--key-pattern" "P:P" "-c" "50"
      "-t" "2" "--hide-histogram" "--key-minimum" "1" "--key-maximum" "1000000" "-n"
      "allkeys" --pipeline 50'
  resources:
    requests:
      memory: 1g
  dataset_name: 1Mkeys-string-10B-size
  dataset_description: This dataset contains 1 million string keys, each with a data
    size of 10 bytes.
tested-commands:
- info
tested-groups:
- generic
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: '--command "INFO ALL" -c 10 -t 4 --hide-histogram --test-time 120'
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 50
