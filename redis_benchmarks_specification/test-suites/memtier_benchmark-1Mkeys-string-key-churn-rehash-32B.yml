version: 0.4
name: memtier_benchmark-1Mkeys-string-key-churn-rehash-32B
description: High-churn key insertion/deletion workload that forces continuous dict
  rehash cycles. Uses SET with new random keys and DEL on existing keys in a 50/50
  mix, causing the dict to grow and shrink repeatedly. Validates dict-rehash-incremental-page-release
  tail-latency fix (MADV_DONTNEED on fully-migrated pages during rehash). Also exercises
  rehash abort on shrink patterns. Max latency is the key metric for this benchmark.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: '"--data-size" "32" "--ratio" "1:0" "--key-pattern" "P:P" "-c" "50"
      "-t" "2" "--hide-histogram" "--key-minimum" "1" "--key-maximum" "1000000" "-n"
      "allkeys" --pipeline 50'
  resources:
    requests:
      memory: 1g
  dataset_name: 1Mkeys-string-32B-size
  dataset_description: This dataset contains 1 million string keys, each with a data
    size of 32 bytes. The benchmark then adds new keys beyond 1M and deletes existing
    keys, forcing dict rehash cycles.
tested-commands:
- set
- del
tested-groups:
- string
- generic
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: '--command "SET __key__ __data__" --command-key-pattern R --command "DEL
    __key__" --command-key-pattern R --data-size 32 --key-minimum 1 --key-maximum
    3000000 -c 25 -t 4 --hide-histogram --test-time 180'
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 50
