version: 0.4
name: memtier_benchmark-1Mkeys-string-acl-whoami
description: Measures throughput of ACL WHOAMI on a pre-authenticated connection.
  ACL WHOAMI returns the username of the current connection and exercises the ACL
  fast-path lookup. Preloads 1M keys to simulate a realistic server state. This
  benchmark targets the ACL command dispatch and user lookup overhead.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: '"--data-size" "10" "--ratio" "1:0" "--key-pattern" "P:P" "-c" "50"
      "-t" "2" "--hide-histogram" "--key-minimum" "1" "--key-maximum" "1000000" "-n"
      "allkeys" --pipeline 50'
  resources:
    requests:
      memory: 1g
  dataset_name: 1Mkeys-string-10B-size
  dataset_description: This dataset contains 1 million string keys, each with a data
    size of 10 bytes.
tested-commands:
- acl
tested-groups:
- generic
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: '--command "ACL WHOAMI" -c 10 -t 4 --hide-histogram --test-time 120'
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 50
