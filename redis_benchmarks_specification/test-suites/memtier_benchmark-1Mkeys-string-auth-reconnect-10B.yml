version: 0.4
name: memtier_benchmark-1Mkeys-string-auth-reconnect-10B
description: Measures throughput under rapid connection churn with AUTH authentication
  on every connection. Each memtier client reconnects frequently (-c 1 --reconnect-interval 1),
  forcing AUTH + GET on each connection cycle. Validates the overhead of argument
  redaction on the AUTH hot path (defer-argv-redaction optimization target).
dbconfig:
  configuration-parameters:
    save: '""'
    requirepass: '"benchmarkpass"'
  check:
    keyspacelen: 1000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: '"--data-size" "10" "--ratio" "1:0" "--key-pattern" "P:P" "-c" "50"
      "-t" "2" "--hide-histogram" "--key-minimum" "1" "--key-maximum" "1000000" "-n"
      "allkeys" --pipeline 50 -a benchmarkpass'
  resources:
    requests:
      memory: 1g
  dataset_name: 1Mkeys-string-10B-size
  dataset_description: This dataset contains 1 million string keys, each with a data
    size of 10 bytes. Server has requirepass set to exercise AUTH on every connection.
tested-commands:
- auth
- get
tested-groups:
- string
- connection
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: '"--data-size" "10" --distinct-client-seed --ratio 0:1 --key-pattern
    R:R -c 1 -t 10 --hide-histogram --test-time 120 --key-minimum 1 --key-maximum
    1000000 -a benchmarkpass --reconnect-interval 1'
  resources:
    requests:
      cpus: '10'
      memory: 2g
priority: 50
