version: 0.4
name: memtier_benchmark-1Mkeys-string-unlink-heavy-32B
description: Heavy UNLINK workload with 50% SET new keys and 50% UNLINK existing keys.
  Uses a 3M key range to create churn where large batches of keys are async-freed
  via UNLINK. Validates the async free path and lazy-free thread performance under
  continuous key creation and deletion pressure. Preloads 1M keys with 32 byte values.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 1000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: '"--data-size" "32" "--ratio" "1:0" "--key-pattern" "P:P" "-c" "50"
      "-t" "2" "--hide-histogram" "--key-minimum" "1" "--key-maximum" "1000000" "-n"
      "allkeys" --pipeline 50'
  resources:
    requests:
      memory: 1g
  dataset_name: 1Mkeys-string-32B-size
  dataset_description: This dataset contains 1 million string keys, each with a data
    size of 32 bytes. The benchmark then creates new keys and UNLINKs existing keys
    across a 3M key range.
tested-commands:
- set
- unlink
tested-groups:
- string
- generic
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: '--command "SET __key__ __data__" --command-key-pattern R --command "UNLINK
    __key__" --command-key-pattern R --data-size 32 --key-minimum 1 --key-maximum
    3000000 -c 25 -t 4 --hide-histogram --test-time 180'
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 50
