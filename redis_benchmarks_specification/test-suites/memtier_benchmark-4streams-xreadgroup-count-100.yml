version: 0.4
name: memtier_benchmark-4streams-xreadgroup-count-100
description: >
  Multi-stream XREADGROUP benchmark. Pre-loads 4 independent streams with 2.5M entries
  each (10M total), creates a consumer group on each stream, then benchmarks XREADGROUP
  reading COUNT 100 from all 4 streams in a single command. This tests the multi-stream
  read path with radix-tree lookups across multiple keys.
dbconfig:
  configuration-parameters:
    save: '""'
  check:
    keyspacelen: 4
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: >
      "--data-size" "100"
      --command "XADD stream:1 * field __data__" --command-key-pattern P --command-ratio 25
      --command "XADD stream:2 * field __data__" --command-key-pattern P --command-ratio 25
      --command "XADD stream:3 * field __data__" --command-key-pattern P --command-ratio 25
      --command "XADD stream:4 * field __data__" --command-key-pattern P --command-ratio 25
      -n 12500 -c 50 -t 4 --hide-histogram
  init_commands:
    - XGROUP CREATE stream:1 test-group 0 MKSTREAM
    - XGROUP CREATE stream:2 test-group 0 MKSTREAM
    - XGROUP CREATE stream:3 test-group 0 MKSTREAM
    - XGROUP CREATE stream:4 test-group 0 MKSTREAM
  resources:
    requests:
      memory: 4g
  dataset_name: 4streams-2.5M-entries-each-with-consumer-group
  dataset_description: 4 stream keys with ~2.5M entries each (10M total), each with a consumer group named 'test-group'.
tested-commands:
- xreadgroup
tested-groups:
- stream
redis-topologies:
- oss-standalone
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: >
    --command "XREADGROUP GROUP test-group consumer1 COUNT 100 STREAMS stream:1 stream:2 stream:3 stream:4 > > > >"
    --hide-histogram
    -n 1000 -c 25 -t 4
  resources:
    requests:
      cpus: '4'
      memory: 2g
priority: 94
