version: 0.4
name: memtier_benchmark-20Mkeys-load-string-with-1KiB-values-replica-only-parallel-fullsync-04
description: |
  Replication full-sync benchmark with parallel-fullsync-streams=4 on the
  master. PoC variant for the multi-threaded full sync work — see
  approaches/multi-threaded-full-sync.md in the agent workspace.

  Identical to memtier_benchmark-20Mkeys-load-string-with-1KiB-values-replica-only
  except `parallel-fullsync-streams 4`. Single replica topology, single
  data point — the goal is the GO/NO-GO comparison vs the same workload
  with parallel-fullsync-streams=1 (the default).
dbconfig:
  preload_before_replica: true
  configuration-parameters:
    save: '""'
    maxmemory-policy: noeviction
    parallel-fullsync-streams: '4'
  check:
    keyspacelen: 20000000
  preload_tool:
    run_image: redislabs/memtier_benchmark:edge
    tool: memtier_benchmark
    arguments: --data-size 1024 --ratio 1:0 -n allkeys --pipeline 50 --key-maximum
      20000000 --key-pattern P:P --key-minimum 1 --hide-histogram -t 8 -c 25
  resources:
    requests:
      memory: 25g
  dataset_name: 20Mkeys-string-1KiB-size
  dataset_description: |
    20 million string keys, each with a 1024-byte value (~20 GB dataset).
tested-commands:
- set
redis-topologies:
- oss-standalone-01-replicas
build-variants:
- gcc:15.2.0-amd64-debian-bookworm-default
- gcc:15.2.0-arm64-debian-bookworm-default
- dockerhub
clientconfig:
  run_image: redislabs/memtier_benchmark:edge
  tool: memtier_benchmark
  arguments: '"--data-size" "1024" --pipeline 10 --distinct-client-seed --ratio 0:1
    --key-pattern R:R --key-minimum=1 --key-maximum 20000000 --test-time 30 -c 50
    -t 4 --hide-histogram'
  resources:
    requests:
      cpus: '4'
      memory: 1g
tested-groups:
- string
priority: 17
